<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>JARVIS</title>
<style>
  html, body { margin: 0; height: 100%; background: #111114; overflow: hidden; }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; color: #f2f2f5;
    -webkit-user-select: none; user-select: none;
  }
  .mark {
    width: 64px; height: 64px; border-radius: 16px;
    background: #8b5cf6; display: flex; align-items: center; justify-content: center;
    font-size: 30px; font-weight: 800; color: #fff;
  }
  .label { font-size: 13px; color: #9a9aa5; letter-spacing: .02em; }
  .bar { width: 160px; height: 3px; border-radius: 2px; background: rgba(255,255,255,.08); overflow: hidden; }
  .bar > div {
    width: 40%; height: 100%; background: #8b5cf6; border-radius: 2px;
    animation: slide 1.1s ease-in-out infinite;
  }
  @keyframes slide {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(250%); }
  }
</style>
</head>
<body>
  <div class="mark">J</div>
  <div class="bar"><div></div></div>
  <div class="label">Iniciando o JARVIS…</div>
</body>
</html>
