<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Parear o JARVIS</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #111114; color: #f2f2f5;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    padding: 26px; display: flex; flex-direction: column; gap: 16px;
  }
  h1 { font-size: 16px; margin: 0; }
  p.hint { font-size: 12px; color: #9a9aa5; line-height: 1.5; margin: 0; }
  label { font-size: 11.5px; color: #9a9aa5; display: block; margin-bottom: 4px; }
  input {
    width: 100%; background: #000; border: 1px solid rgba(255,255,255,.08); border-radius: 10px;
    color: #f2f2f5; padding: 10px 12px; font-size: 13px; font-family: inherit;
  }
  input:focus { outline: none; border-color: #8b5cf6; }
  button {
    background: #8b5cf6; color: #fff; border: none; border-radius: 10px;
    padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  button:disabled { opacity: .5; cursor: default; }
  .field { display: flex; flex-direction: column; gap: 10px; }
  .code-box {
    display: none; flex-direction: column; align-items: center; gap: 10px;
    padding: 18px; border: 1px solid rgba(139,92,246,.4); border-radius: 12px;
    background: rgba(139,92,246,.08);
  }
  .code-box.show { display: flex; }
  .code { font-family: "SF Mono", Consolas, monospace; font-size: 28px; font-weight: 700; letter-spacing: .06em; }
  .status { font-size: 12px; color: #9a9aa5; }
  .error { font-size: 12px; color: #ff6b6b; display: none; }
  .error.show { display: block; }
</style>
</head>
<body>
  <h1>Parear o Agente Local</h1>
  <p class="hint">Isto conecta este PC ao seu backend JARVIS. Um código vai aparecer aqui — confirme ele no site, em Configurações → Agente Local.</p>

  <div class="field" id="form">
    <div>
      <label for="backend-url">URL do backend</label>
      <input id="backend-url" type="text" placeholder="https://seu-backend.onrender.com" autofocus>
    </div>
    <div>
      <label for="device-name">Nome deste dispositivo</label>
      <input id="device-name" type="text" placeholder="Meu PC">
    </div>
    <button id="start-btn">Iniciar pareamento</button>
  </div>

  <div class="code-box" id="code-box">
    <div class="status">Código de pareamento</div>
    <div class="code" id="code-value">····-····</div>
    <div class="status" id="poll-status">Aguardando confirmação no site…</div>
  </div>

  <p class="error" id="error"></p>

  <script>
    const form = document.getElementById("form");
    const startBtn = document.getElementById("start-btn");
    const codeBox = document.getElementById("code-box");
    const codeValue = document.getElementById("code-value");
    const pollStatus = document.getElementById("poll-status");
    const errorEl = document.getElementById("error");

    window.pairingBridge.onEvent((evt) => {
      if (evt.type === "code") {
        form.style.display = "none";
        codeBox.classList.add("show");
        codeValue.textContent = evt.userCode;
        pollStatus.textContent = `Aguardando confirmação no site… (expira em ${Math.round(evt.expiresIn / 60)} min)`;
      } else if (evt.type === "pending") {
        pollStatus.textContent = "Ainda aguardando confirmação no site…";
      } else if (evt.type === "slow_down") {
        pollStatus.textContent = "Verificando com menos frequência…";
      } else if (evt.type === "approved") {
        pollStatus.textContent = "Confirmado! Conectando…";
      }
    });

    startBtn.addEventListener("click", async () => {
      const backendUrl = document.getElementById("backend-url").value.trim();
      const name = document.getElementById("device-name").value.trim() || "Meu PC";
      if (!backendUrl) {
        errorEl.textContent = "Preencha a URL do backend.";
        errorEl.classList.add("show");
        return;
      }
      errorEl.classList.remove("show");
      startBtn.disabled = true;
      startBtn.textContent = "Conectando…";
      const result = await window.pairingBridge.start({ backendUrl, name, platform: navigator.platform.toLowerCase().includes("win") ? "win32" : navigator.platform.toLowerCase() });
      if (!result.ok) {
        errorEl.textContent = result.error || "Falha no pareamento.";
        errorEl.classList.add("show");
        form.style.display = "flex";
        codeBox.classList.remove("show");
        startBtn.disabled = false;
        startBtn.textContent = "Tentar de novo";
      }
      // sucesso: o processo principal fecha esta janela sozinho
    });
  </script>
</body>
</html>
